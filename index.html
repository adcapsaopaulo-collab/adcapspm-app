<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADCAP SPM</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b5d2a">
<style>
body{margin:0;font-family:Arial;background:#0b5d2a;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center}
button{background:white;color:#0b5d2a;border:none;padding:12px 20px;border-radius:8px;margin-top:20px}
#whatsappBtn{position:fixed;bottom:20px;right:20px;z-index:999}
#whatsappBtn img{width:60px;height:60px}
</style>
</head>
<body>
<h1>ADCAP SPM</h1>
<p>Carregando...</p>
<button id="installBtn" style="display:none;">Instalar App</button>
<a href="https://wa.me/5511961871635" target="_blank" id="whatsappBtn">
<img src="icons/whatsapp.png" alt="WhatsApp">
</a>
<script>
let deferredPrompt;
const btn=document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;btn.style.display='block';});
btn.addEventListener('click',async()=>{if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;btn.style.display='none';}});
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js');}
setTimeout(()=>{window.location.href="https://adcapspm.blogspot.com/";},1500);
</script>
</body>
</html>
