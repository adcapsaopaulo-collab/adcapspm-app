<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ADCAP SPM</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0b5d2a" />
<link rel="icon" href="icons/icon-192.png" />
<style>
body{margin:0;font-family:Arial;background:#0b5d2a;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center}
img{width:180px;margin-bottom:20px}
button{background:#fff;color:#0b5d2a;border:none;padding:12px 20px;margin-top:20px;border-radius:8px;font-size:16px;cursor:pointer}
a{color:#fff;margin-top:15px;display:block;text-decoration:underline}
</style>
</head>
<body>
<img src="icons/logo.png"/>
<h1>ADCAP SPM</h1>
<p>Acesse o portal da associação</p>
<button id="installBtn" style="display:none;">Instalar App</button>
<a href="https://adcapspm.blogspot.com/">Entrar no site</a>
<script>
let deferredPrompt;
const installBtn=document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;installBtn.style.display='block';});
installBtn.addEventListener('click',async()=>{if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;installBtn.style.display='none';}});
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js');}
setTimeout(()=>{window.location.href="https://adcapspm.blogspot.com/";},15000);
</script>
</body>
</html>
